<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Action Item Extractor</title>
  <style>
    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, Noto Sans, sans-serif;
      margin: 2rem auto;
      max-width: 800px;
      padding: 0 1rem;
    }

    h1 {
      font-size: 1.5rem;
    }

    textarea {
      width: 100%;
      min-height: 160px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, monospace;
    }

    button {
      padding: 0.5rem 1rem;
    }

    .items {
      margin-top: 1rem;
    }

    .item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.25rem 0;
    }

    .muted {
      color: #6b7280;
      font-size: 0.875rem;
    }

    .row {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      flex-wrap: wrap;
    }

    hr {
      margin: 1.25rem 0;
      border: none;
      border-top: 1px solid #e5e7eb;
    }

    .note {
      padding: 0.5rem 0;
      border-bottom: 1px solid #f3f4f6;
    }

    .note pre {
      margin: 0.25rem 0 0;
      white-space: pre-wrap;
      word-break: break-word;
    }
  </style>
</head>

<body>
  <h1>Action Item Extractor</h1>
  <p class="muted">Paste notes and extract actionable items. Minimal raw HTML frontend.</p>

  <label for="text">Notes</label>
  <textarea id="text"
    placeholder="Paste notes here...&#10;e.g.&#10;- [ ] Set up database&#10;- Implement extract endpoint"></textarea>

  <div class="row">
    <label class="row"><input id="save_note" type="checkbox" checked /> Save as note</label>
    <button id="extract">Extract</button>
    <button id="extract_llm">Extract LLM</button>
    <button id="list_notes">List Notes</button>
  </div>

  <div class="items" id="items"></div>

  <hr />

  <h2 style="font-size: 1.1rem; margin: 0;">Notes</h2>
  <p class="muted" style="margin-top: 0.25rem;">Saved notes in the database.</p>
  <div class="items" id="notes"></div>

  <script>
    const $ = (sel) => document.querySelector(sel);

    const itemsEl = $('#items');
    const notesEl = $('#notes');

    async function renderActionItems(endpoint) {
      const text = $('#text').value;
      const save = $('#save_note').checked;

      itemsEl.textContent = 'Extracting...';
      try {
        const res = await fetch(endpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text, save_note: save }),
        });
        if (!res.ok) throw new Error('Request failed');

        const data = await res.json();
        if (!data.items || data.items.length === 0) {
          itemsEl.innerHTML = '<p class="muted">No action items found.</p>';
          return;
        }

        itemsEl.innerHTML = data.items.map(it => (
          `<div class="item">
              <input type="checkbox" data-id="${it.id}" ${it.done ? 'checked' : ''} />
              <span>${it.text}</span>
            </div>`
        )).join('');

        itemsEl.querySelectorAll('input[type="checkbox"]').forEach(cb => {
          cb.addEventListener('change', async (e) => {
            const id = e.target.getAttribute('data-id');
            await fetch(`/action-items/${id}/done`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ done: e.target.checked }),
            });
          });
        });
      } catch (err) {
        console.error(err);
        itemsEl.textContent = 'Error extracting items';
      }
    }

    async function listNotes() {
      notesEl.textContent = 'Loading notes...';
      try {
        const res = await fetch('/notes/', { method: 'GET' });
        if (!res.ok) throw new Error('Request failed');

        const notes = await res.json();
        if (!Array.isArray(notes) || notes.length === 0) {
          notesEl.innerHTML = '<p class="muted">No notes saved yet.</p>';
          return;
        }

        notesEl.innerHTML = notes.map(n => (
          `<div class="note">
              <div class="muted">#${n.id} • ${n.created_at}</div>
              <pre>${escapeHtml(n.content)}</pre>
            </div>`
        )).join('');
      } catch (err) {
        console.error(err);
        notesEl.textContent = 'Error loading notes';
      }
    }

    // Prevent HTML injection when rendering note content
    function escapeHtml(s) {
      return String(s)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    // Existing Extract (rule-based)
    $('#extract').addEventListener('click', async () => {
      await renderActionItems('/action-items/extract');
    });

    // New Extract LLM
    $('#extract_llm').addEventListener('click', async () => {
      await renderActionItems('/action-items/extract?use_llm=true');
    });

    // New List Notes
    $('#list_notes').addEventListener('click', async () => {
      await listNotes();
    });
  </script>
</body>

</html>
